# Publishes docs/ at https://<owner>.github.io/<repo>/
#
# One-time (required before the first deploy succeeds):
#   Repository → Settings → Pages → Build and deployment → Source: "GitHub Actions" → Save.
# Do not use actions/configure-pages here: it calls GET /pages and returns 404 until the
# site is registered above. Static deploys only need upload-pages-artifact + deploy-pages.

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
